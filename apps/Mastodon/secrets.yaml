apiVersion: v1
kind: Secret
metadata:
  name: mastodon-secrets
  namespace: mastodon
type: Opaque
# Replace these placeholder values before applying.
# Generate base64 values with: echo -n "your-value" | base64
# Recommended: manage this Secret as a SealedSecret instead of committing raw values.
data:
  DB_USER: <BASE64_DB_USER>
  DB_PASS: <BASE64_DB_PASSWORD>
  SECRET_KEY_BASE: <BASE64_RAILS_SECRET_KEY_BASE>
  OTP_SECRET: <BASE64_OTP_SECRET>
  SMTP_LOGIN: <BASE64_SMTP_LOGIN>
  SMTP_PASSWORD: <BASE64_SMTP_APP_PASSWORD>
