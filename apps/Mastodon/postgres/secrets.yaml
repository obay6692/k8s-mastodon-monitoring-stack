apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: mastodon
type: Opaque
# Replace these placeholder values before applying.
# Generate base64 values with: echo -n "your-value" | base64
# Recommended: manage this Secret as a SealedSecret instead of committing raw values.
data:
  username: <BASE64_POSTGRES_USERNAME>
  password: <BASE64_POSTGRES_PASSWORD>
