apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: general
  namespace: monitoring
  labels:
    team: devops-by-example
spec:
  groups:
    - name: general
      rules:
        - alert: TargetDown
          expr: 100 * (count(up == 0) BY (job) / count(up) BY (job)) > 10
          for: 1m
          labels:
            severity: warning
          annotations:
            message: '{{ $value }}% of the {{ $labels.job }} targets are down.'
