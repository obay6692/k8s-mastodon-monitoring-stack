apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-demo
  namespace: monitoring
type: Opaque
# Replace the placeholder values below before applying.
# Recommended: manage this Secret as a SealedSecret instead of committing raw credentials.
stringData:
  alertmanager.yaml: |-
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: '<SMTP_FROM_ADDRESS>'
      smtp_auth_username: '<SMTP_LOGIN>'
      smtp_auth_password: '<SMTP_APP_PASSWORD>'
      smtp_require_tls: true
    route:
      receiver: 'email-alerts'
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: 'email-alerts'
        email_configs:
          - to: '<ALERT_RECIPIENT_EMAIL>'
            send_resolved: true
